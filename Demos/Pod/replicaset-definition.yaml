apiVersion: apps/v1
kind: ReplicaSet

metadata:
  name: myapp-replicaset
  labels:
    app: myapp
    type: front-end # ReplicaSet 자체에 붙는 라벨

spec:
  template:
    metadata:
      name: myapp-pod
      labels:
        app: myapp
        type: front-end # Pod 에 붙는 라벨
      spec:
        containers:
          - name: nginx-container
            image: nginx
  replicas: 3
  selector:
    matchLabels:
      type: front-end # 추적할 Pod 라벨